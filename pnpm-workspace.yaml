packages:
  - 'plugins/**'

patchedDependencies:
  body-parser@2: lib/modules/body-parser.patch
  compression: lib/modules/compression.patch
  log4js: lib/modules/log4js.patch
  streamroller: lib/modules/streamroller.patch

strictDepBuilds: false
allowBuilds:
  classic-level: true
  log4js: true
  puppeteer: true
  sqlite3: true
  sharp: true
onlyBuiltDependencies:
  - classic-level
  - log4js
  - puppeteer
  - sqlite3
  - sharp
